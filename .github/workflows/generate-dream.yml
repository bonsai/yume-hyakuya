name: Generate Dream to Wiki

on:
  repository_dispatch:
    types: [generate-dream]

jobs:
  generate:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Generate dream via Sakura API
        env:
          SAKURA_API_TOKEN: ${{ secrets.SAKURA_API_TOKEN }}
        run: |
          python << 'EOF'
          import os, requests, json, time, random

          TOKEN = os.getenv("SAKURA_API_TOKEN")
          API_BASE = "https://api.ai.sakura.ad.jp/v1"

          seed = "${{ github.event.client_payload.seed }}"
          if seed:
              prompt = f"以下はユーザー提供の夢の種です：{seed}\n星新一風のSF短編（夢日記形式）を作成してください。400字原稿用紙に6割くらい埋める分量で、人間の欲望に関する奇抜でシュールな内容にしてください。"
          else:
              prompt = "星新一風のSF短編（夢日記形式）を作成してください。400字原稿用紙に6割くらい埋める分量で、人間の欲望に関する奇抜でシュールな内容にしてください。テーマにとらわれず自由な発想で。"

          resp = requests.post(
              f"{API_BASE}/chat/completions",
              headers={"Authorization": f"Bearer {TOKEN}", "Content-Type": "application/json"},
              json={
                  "model": "gpt-oss-120b",
                  "messages": [{"role": "user", "content": prompt}],
                  "max_tokens": 500,
                  "stream": False
              },
              timeout=30
          )
          resp.raise_for_status()
          content = resp.json()["choices"][0]["message"]["content"]

          # 400字に正規化
          import re
          flat = re.sub(r'\s+', '', content)
          if len(flat) > 400:
              flat = flat[:400]
          elif len(flat) < 400:
              flat += '。' * (400 - len(flat))

          result = {
              "id": int(time.time()),
              "date": time.strftime("%Y-%m-%d"),
              "genre": "SF",
              "text": flat,
              "length": len(flat),
              "seed": seed or None
          }

          with open("dream_latest.json", "w", encoding="utf-8") as f:
              json.dump(result, f, ensure_ascii=False, indent=2)

          print(f"Generated dream: {result['id']}")
          EOF

      - name: Clone wiki and push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Clone wiki
          git clone --depth 1 https://x-access-token:${GH_TOKEN}@github.com/bonsai/yume-senya.wiki.git wiki

          # Add dream JSON
          cp dream_latest.json wiki/dream_$(date +%Y%m%d_%H%M%S).json

          # Update index
          cd wiki
          ls dream_*.json | sort > index.txt

          git add .
          git commit -m "Add new dream $(date +%Y-%m-%d)"
          git push
