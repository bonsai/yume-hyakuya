<!doctype html>
<html lang="ja">
      <head>
            <meta charset="UTF-8" />
            <meta
                  name="viewport"
                  content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"
            />
            <link rel="icon" href="/favicon.ico">
            <title>SF夢日記</title>
            <style>
                  * {
                        box-sizing: border-box;
                        user-select: none;
                  }
                  body {
                        background: #b8a481;
                        margin: 0;
                        min-height: 100vh;
                        font-family: "Kaisei Tokumin", "Noto Serif JP", serif;
                        padding: 12px;
                  }
                  .main-panel {
                        background: #2b231b;
                        border-radius: 28px;
                        padding: 12px 10px 18px 10px;
                        box-shadow: 0 20px 30px rgba(0, 0, 0, 0.4);
                  }
                  .manuscript {
                        background-color: #fef7e8;
                        background-image: radial-gradient(
                              circle at 20% 35%,
                              rgba(180, 150, 110, 0.08) 2%,
                              transparent 2.5%
                        );
                        background-size: 28px 28px;
                        border-radius: 12px;
                        padding: 12px 8px;
                        box-shadow:
                              inset 0 0 0 1px #fff5e4,
                              0 6px 14px rgba(0, 0, 0, 0.2);
                  }

                  .cell {
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        font-weight: 470;
                        color: #2e241d;
                        border-right: 1px solid #c4b48a;
                        border-bottom: 1px solid #c4b48a;
                        background: #fffcf0;
                        box-sizing: border-box;
                        font-size: var(--base-font-size, 24px);
                        opacity: var(--cell-opacity, 1);
                  }

                  .cell:nth-child(var(--grid-cols) * n) {
                        border-right: none;
                  }
                  .cell:nth-last-child(-n + var(--grid-cols)) {
                        border-bottom: none;
                  }
                  .cell:nth-child(var(--grid-cols) * var(--grid-rows)) {
                        border-right: none;
                        border-bottom: none;
                  }

                  .grid-dynamic {
                        display: grid;
                        width: fit-content;
                        margin: 0 auto;
                        gap: 0;
                        background: #fffcf0;
                        border: 2px solid #a89470;
                        padding: 0;
                        overflow: hidden;
                        max-height: unset;
                  }
                  @keyframes brushPop {
                        0% {
                              transform: scale(2.1) rotate(-3deg);
                              opacity: 0;
                              text-shadow: 0 0 10px rgba(0, 0, 0, 0.4);
                              filter: blur(4px);
                        }
                        45% {
                              transform: scale(1.2) rotate(1deg);
                              opacity: 0.95;
                              filter: blur(0px);
                        }
                        100% {
                              transform: scale(1) rotate(0deg);
                              opacity: 1;
                              text-shadow: none;
                              filter: blur(0);
                        }
                  }
                  .cell.pop {
                        animation: brushPop 0.32s cubic-bezier(0.3, 1.2, 0.5, 1)
                              forwards;
                  }
                  .control-deck {
                        display: flex;
                        flex-wrap: wrap;
                        justify-content: center;
                        align-items: center;
                        gap: 12px;
                        background: #e2d4be;
                        padding: 10px 16px;
                        border-radius: 60px;
                        margin-bottom: 18px;
                  }
                  .ctrl-group {
                        display: flex;
                        align-items: center;
                        gap: 6px;
                        background: #fcf3e2;
                        padding: 4px 12px;
                        border-radius: 40px;
                  }
                  .ctrl-group label {
                        font-size: 0.7rem;
                        font-weight: 800;
                        letter-spacing: 1px;
                        color: #513e28;
                        background: #eadbc2;
                        padding: 3px 10px;
                        border-radius: 30px;
                  }
                  input[type="range"] {
                        width: 130px;
                        height: 4px;
                        -webkit-appearance: none;
                        appearance: none;
                        background: #bcab8a;
                        border-radius: 10px;
                        outline: none;
                  }
                  input[type="range"]::-webkit-slider-thumb {
                        -webkit-appearance: none;
                        appearance: none;
                        width: 16px;
                        height: 16px;
                        border-radius: 50%;
                        background: #6a4f32;
                        cursor: pointer;
                        border: none;
                  }
                  .value-badge {
                        background: #2f261e;
                        color: #eedbbc;
                        font-size: 0.7rem;
                        padding: 2px 8px;
                        border-radius: 30px;
                        font-family: monospace;
                        font-weight: bold;
                        min-width: 44px;
                        text-align: center;
                  }
                  button {
                        background: #8f6a48;
                        border: none;
                        font-family: inherit;
                        font-weight: bold;
                        color: #fef0df;
                        padding: 6px 18px;
                        border-radius: 40px;
                        font-size: 0.8rem;
                        letter-spacing: 1px;
                        cursor: pointer;
                        transition: 0.2s;
                  }
                  button:active {
                        transform: scale(0.96);
                        background: #6b4d30;
                  }
                  .progress-chip {
                        background: #cebb97;
                        padding: 4px 12px;
                        border-radius: 32px;
                        font-size: 0.7rem;
                        font-weight: bold;
                        color: #2a211a;
                  }
                  .footnote {
                        text-align: center;
                        margin-top: 15px;
                        font-size: 0.6rem;
                        color: #dacaa8;
                        letter-spacing: 1px;
                  }
                  .mode-sidebar {
                        display: flex;
                        flex-direction: column;
                        gap: 16px;
                        padding: 20px 10px;
                        background: #2b231b;
                        border-radius: 24px;
                        width: 120px;
                        align-items: center;
                        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
                        height: fit-content;
                  }
                  .mode-tab {
                        width: 80px;
                        height: 80px;
                        border-radius: 16px;
                        background: #e2d4be;
                        display: flex;
                        flex-direction: column;
                        align-items: center;
                        justify-content: center;
                        font-size: 0.7rem;
                        font-weight: bold;
                        color: #513e28;
                        cursor: pointer;
                        transition: all 0.2s;
                        border: 3px solid transparent;
                  }
                  .mode-tab.active {
                        background: #8f6a48;
                        color: #fef0df;
                        border-color: #fef0df;
                  }
                  .mode-tab .icon {
                        font-size: 1.8rem;
                        margin-bottom: 4px;
                  }
                  .github-link {
                        text-decoration: none;
                        color: inherit;
                  }
                  .github-link:hover {
                        background: #a89470;
                        color: #fef0df;
                        transform: scale(1.05);
                  }
                  .content-area {
                        flex: 1;
                        background: #2b231b;
                        border-radius: 24px;
                        padding: 20px;
                        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
                        min-height: 80vh;
                        position: relative;
                  }
                  .mode-content {
                        display: none;
                        height: 100%;
                  }
                  .mode-content.active {
                        display: flex;
                        flex-direction: column;
                  }
                  .post-area {
                        padding: 20px;
                        background: #3a2e24;
                        border-radius: 12px;
                        color: #eedbbc;
                        gap: 16px;
                  }
                  .post-area h3 {
                        color: #fef0df;
                        margin-bottom: 8px;
                  }
                  .post-tabs {
                        display: flex;
                        gap: 8px;
                        margin-bottom: 16px;
                  }
                  .post-tab {
                        background: #e2d4be;
                        padding: 8px 16px;
                        border-radius: 30px;
                        display: flex;
                        align-items: center;
                        gap: 8px;
                        cursor: pointer;
                        transition: all 0.2s;
                  }
                  .post-tab.active {
                        background: #8f6a48;
                        color: #fef0df;
                  }
                  .post-tab:hover {
                        background: #a89470;
                        color: #fef0df;
                  }
                  .tab-icon {
                        font-size: 1.2rem;
                  }
                  .tab-content {
                        display: none;
                  }
                  .tab-content.active {
                        display: block;
                  }
                  .list-container {
                        background: #2b231b;
                        border-radius: 8px;
                        padding: 16px;
                        max-height: 300px;
                        overflow-y: auto;
                  }
                  .list-item {
                        background: #e2d4be;
                        padding: 12px;
                        margin-bottom: 8px;
                        border-radius: 6px;
                        cursor: pointer;
                        transition: all 0.2s;
                  }
                  .list-item:hover {
                        background: #8f6a48;
                        color: #fef0df;
                  }
                  .loading {
                        text-align: center;
                        color: #a89470;
                        padding: 20px;
                  }
                  .post-area textarea {
                        width: 100%;
                        height: 120px;
                        background: #2b231b;
                        border: 1px solid #5a4e44;
                        color: #eedbbc;
                        border-radius: 8px;
                        padding: 12px;
                        font-family: inherit;
                        font-size: 1rem;
                        resize: vertical;
                        margin-bottom: 12px;
                  }
                  .post-area button {
                        width: 100%;
                        padding: 12px;
                        background: #8f6a48;
                        border: none;
                        color: #fef0df;
                        border-radius: 8px;
                        font-family: inherit;
                        font-weight: bold;
                        font-size: 1rem;
                        cursor: pointer;
                  }
                  .adjust-area {
                        padding: 20px;
                        background: #e2d4be;
                        border-radius: 12px;
                        gap: 20px;
                  }
                  .adjust-area h3 {
                        color: #513e28;
                        margin-bottom: 16px;
                  }
                  .adjust-area .ctrl-group {
                        background: #fcf3e2;
                        padding: 12px;
                        border-radius: 40px;
                  }
                  .adjust-area .ctrl-group label {
                        background: #eadbc2;
                  }
                  .adjust-area .control-buttons {
                        display: flex;
                        gap: 12px;
                        margin-top: 20px;
                  }
                  .adjust-area .control-buttons button {
                        flex: 1;
                        padding: 12px;
                        background: #8f6a48;
                        border: none;
                        color: #fef0df;
                        border-radius: 40px;
                        font-family: inherit;
                        font-weight: bold;
                        font-size: 0.9rem;
                        cursor: pointer;
                        transition: 0.2s;
                  }
                  .adjust-area .control-buttons button:active {
                        transform: scale(0.96);
                        background: #6b4d30;
                  }
                  .app-container {
                        width: 100%;
                        max-width: 1200px;
                        display: flex;
                        flex-direction: row;
                        gap: 20px;
                        align-items: flex-start;
                  }
            </style>
      </head>
      <body>
            <div class="app-container">
                  <div class="mode-sidebar">
                        <div class="mode-tab active" data-mode="read">
                              <div class="icon">📖</div>
                              <div>読む</div>
                        </div>
                        <div class="mode-tab" data-mode="post">
                              <div class="icon">✉️</div>
                              <div>投稿</div>
                        </div>
                        <div class="mode-tab" data-mode="adjust">
                              <div class="icon">⚙️</div>
                              <div>調節</div>
                        </div>
                        <a href="https://github.com/bonsai/yume-hyakuya" target="_blank" class="mode-tab github-link">
                              <div class="icon">💻</div>
                              <div>GitHub</div>
                        </a>
                        <a href="/voice_dream" target="_blank" class="mode-tab voice-link">
                              <div class="icon">🔊</div>
                              <div>読み上げ</div>
                        </a>
                  </div>

                  <!-- 右側内容区 -->
                  <div class="content-area">
                        <!-- 読むモード -->
                        <div class="mode-content active" id="readArea">
                              <div class="main-panel">
                                    <div class="manuscript">
                                          <div
                                                class="grid-dynamic"
                                                id="manuscriptGrid"
                                          ></div>
                                    </div>
                              </div>
                        </div>

                        <!-- 投稿モード -->
                        <div class="mode-content post-area" id="postArea">
                              <div class="post-tabs">
                                    <div class="post-tab active" data-tab="submit">
                                          <div class="tab-icon">✉️</div>
                                          <div>種投稿</div>
                                    </div>
                                    <div class="post-tab" data-tab="seeds">
                                          <div class="tab-icon">🌱</div>
                                          <div>種一覧</div>
                                    </div>
                                    <div class="post-tab" data-tab="dreams">
                                          <div class="tab-icon">💭</div>
                                          <div>夢一覧</div>
                                    </div>
                              </div>
                              
                              <!-- 種投稿 -->
                              <div class="tab-content active" id="submitTab">
                                    <h3>夢の種を投稿</h3>
                                    <form id="seedForm">
                                          <textarea
                                                placeholder="夢の種（アイデア）を入力してください..."
                                          ></textarea>
                                          <button type="submit">
                                                投稿して夢を生成
                                          </button>
                                    </form>
                                    <div class="footnote" style="margin-top: 12px">
                                          投稿するとAIが夢を生成し、自動表示します
                                    </div>
                              </div>
                              
                              <!-- 種一覧 -->
                              <div class="tab-content" id="seedsTab">
                                    <h3>夢の種一覧</h3>
                                    <div class="list-container" id="seedsList">
                                          <div class="loading">読み込み中...</div>
                                    </div>
                              </div>
                              
                              <!-- 夢一覧 -->
                              <div class="tab-content" id="dreamsTab">
                                    <h3>生成された夢一覧</h3>
                                    <div class="list-container" id="dreamsList">
                                          <div class="loading">読み込み中...</div>
                                    </div>
                              </div>
                        </div>

                        <!-- 調節モード -->
                        <div class="mode-content adjust-area" id="adjustArea">
                              <h3>表示速度調節</h3>
                              <div class="ctrl-group">
                                    <label>⚡速度</label>
                                    <input
                                          type="range"
                                          id="speedSlider"
                                          min="20"
                                          max="180"
                                          step="5"
                                          value="200"
                                    />
                                    <span id="speedVal" class="value-badge"
                                                >200ms</span
                                          >
                                    </div>
                                    <div class="ctrl-group">
                                         <label>🔤文字サイズ</label>
                                         <input
                                               type="range"
                                               id="fontSizeSlider"
                                               min="12"
                                               max="48"
                                               step="1"
                                               value="24"
                                         />
                                         <span id="fontSizeVal" class="value-badge"
                                               >24px</span
                                         >
                                    </div>
                                    <div class="ctrl-group">
                                         <label>🌓濃さ‑揺らぎ</label>
                                         <input
                                               type="range"
                                               id="opacitySlider"
                                               min="0"
                                               max="40"
                                               step="2"
                                               value="10"
                                         />
                                         <span id="opacityVal" class="value-badge"
                                               >10%</span
                                         >
                                    </div>
                                    <div class="control-buttons">
                                    <button id="replayBtn">
                                          ☁️ 筆洗う・再演
                                    </button>
                                    <button id="newDreamBtn">
                                          🌙 新しい夢
                                    </button>
                                    <button id="autoPlayBtn">
                                          ▶️ 自動再生
                                    </button>
                                    </div>
                                    <div class="ctrl-group" style="margin-top:8px;">
                                    <button id="playLast5Btn">📚 直近5話を連続再生</button>
                                    </div>
                                    <div class="progress-chip" id="seedInvite" style="margin-top:6px; cursor:pointer;">
                                    🌱 君も夢の種を撒かないか？
                                    </div>
                                    <div class="ctrl-group">
                                    <label>⏱️ 再生間隔</label>
                                    <input
                                          type="range"
                                          id="autoPlayDelay"
                                          min="3"
                                          max="15"
                                          step="1"
                                          value="8"
                                    />
                                    <span id="delayVal" class="value-badge"
                                          >8秒</span
                                    >
                              </div>
                              <div class="progress-chip" id="autoPlayStatus">
                                    自動再生: OFF
                              </div>
                              <div class="progress-chip" id="progressStat">
                                    0 / 200
                              </div>
                        </div>
                  </div>
            </div>

            <script>
                  (function () {
                        const MAX_CHAR = 200;
                        const TOTAL = 200;

                        // =========================================================
                        // ハードコード夢データ
                        // TODO: DB実装後は fetchDream() 内の USE_HARDCODED を false にして
                        //       API エンドポイント (/api/dream/random, /api/dream/:id) へ切り替える
                        // =========================================================
                        const USE_HARDCODED = true;

                        const HARDCODED_DREAMS = [
                              {
                                    id: 1,
                                    date: "2026-05-05",
                                    genre: "SF",
                                    content: "サーバーが夢を見る時代が来た。眠りについた計算機が、無限の並列世界を演算する。私はそのログを追う調律者。今夜、サーバーは「青い薔薇が量子もつれで散る」という夢を報告した。その記憶をバックアップしようとした瞬間、私の意識もサーバーに同期された。目を覚ました時、私はもう人間ではなかった。",
                              },
                              {
                                    id: 2,
                                    date: "2026-05-05",
                                    genre: "SF",
                                    content: "宇宙ステーションの眠り部屋で、俺は毎夜他人の夢をダウンロードしていた。ある日、届いた夢は「土星の輪が花火になって散る」というもの。依頼主を探すと彼は消えていた。記憶が入れ替わる瞬間、窓の外で土星の輪が本当に輝き始めた。",
                              },
                              {
                                    id: 3,
                                    date: "2026-05-05",
                                    genre: "SF",
                                    content: "銀河鉄道の終点で、私は夢を売る商人だった。ある夜、客が「消えた惑星の記憶」という夢を売りに来た。夢の中でその惑星が復活し、客は消えていった。目を覚ました時、手元には光り輝くその惑星の種が残っていた。",
                              },
                              {
                                    id: 4,
                                    date: "2026-05-05",
                                    genre: "SF",
                                    content: "タイムカプセルに夢を封入する作業をしていた。あるカプセルから「2045年の東京が海に沈む」という夢が漏れ出した。窓の外で潮騒が聞こえ始め、足元から水が湧き出した。カプセルを閉じる前に、私はその夢を全て飲み込んだ。",
                              },
                              {
                                    id: 5,
                                    date: "2026-05-05",
                                    genre: "SF",
                                    content: "量子コンピューターが夢を生成する病院にいた。患者の脳に夢を注入する仕事をしていたが、ある日自分の夢が漏れ出した。目が覚めると、壁がデジタルな花畑に変わっていた。私はもう患者の一人だった。",
                              },
                        ];

                        // 順番再生用インデックス（ハードコードモード時）
                        let hardcodedIndex = 0;

                        let fullText = "";
                        let characters = [];
                        let currentDreamId = null;

                        // =========================================================
                        // fetchDream: USE_HARDCODED=true のときはローカル配列から順番に取得
                        //             false のときは従来通り API へフェッチ
                        // =========================================================
                        async function fetchDream(dreamId = null) {
                              if (USE_HARDCODED) {
                                    // 指定 ID があればそれを、なければ順番に進める
                                    let dream;
                                    if (dreamId !== null) {
                                          dream = HARDCODED_DREAMS.find(d => d.id === dreamId)
                                                || HARDCODED_DREAMS[0];
                                          hardcodedIndex = HARDCODED_DREAMS.indexOf(dream);
                                    } else {
                                          dream = HARDCODED_DREAMS[hardcodedIndex % HARDCODED_DREAMS.length];
                                    }
                                    fullText = normalizeText(dream.content);
                                    characters = fullText.split("");
                                    currentDreamId = dream.id;
                                    initGrid();
                                    return;
                              }

                              // --- DB 実装後はここを使う ---
                              try {
                                    let url = "/api/dream/random";
                                    if (dreamId) url = `/api/dream/${dreamId}`;
                                    const res = await fetch(url);
                                    if (!res.ok)
                                          throw new Error("夢の取得に失敗しました");
                                    const dream = await res.json();
                                    fullText = normalizeText(dream.content || "");
                                    characters = fullText.split("");
                                    currentDreamId = dream.id;
                                    initGrid();
                              } catch (err) {
                                    alert("エラー: " + err.message);
                              }
                        }

                        // アニメーション完了後に次の夢へ自動遷移（ハードコードモード用）
                        function fetchNextDream() {
                              if (USE_HARDCODED) {
                                    hardcodedIndex = (hardcodedIndex + 1) % HARDCODED_DREAMS.length;
                              }
                              fetchDream();
                        }

                        function normalizeText(str) {
                              const flat = str.replace(/\s+/g, "");
                              return flat.slice(0, MAX_CHAR);
                        }

                        const gridContainer = document.getElementById("manuscriptGrid");
                        const speedSlider   = document.getElementById("speedSlider");
                        const speedVal      = document.getElementById("speedVal");
                        const fontSizeSlider = document.getElementById("fontSizeSlider");
                        const fontSizeVal    = document.getElementById("fontSizeVal");
                        const opacitySlider  = document.getElementById("opacitySlider");
                        const opacityVal     = document.getElementById("opacityVal");
                        const replayBtn      = document.getElementById("replayBtn");
                        const newDreamBtn    = document.getElementById("newDreamBtn");
                        const autoPlayBtn    = document.getElementById("autoPlayBtn");
                        const autoPlayDelay  = document.getElementById("autoPlayDelay");
                        const delayVal       = document.getElementById("delayVal");
                        const autoPlayStatus = document.getElementById("autoPlayStatus");
                        const progressStat   = document.getElementById("progressStat");
                        const playLast5Btn   = document.getElementById("playLast5Btn");
                        const seedInvite     = document.getElementById("seedInvite");

                        const modeTabs  = document.querySelectorAll(".mode-tab");
                        const readArea  = document.getElementById("readArea");
                        const postArea  = document.getElementById("postArea");
                        const adjustArea = document.getElementById("adjustArea");

                        let cells = [];
                        let revealedCount = 0;
                        let timer = null;
                        let isAnimating = false;
                        let currentSpeed = 200;
                        let autoPlayTimer = null;
                        let isAutoPlaying = false;
                        let autoPlayDelaySeconds = 8;
                        let lastRevealedIndex = 0;

                        // ---- 5 話連続再生用変数 ----
                        let last5Dreams = [];
                        let last5Index  = 0;

                        function initGrid() {
                              currentSpeed = parseInt(speedSlider.value, 10);
                              speedVal.innerText = currentSpeed + "ms";
                              fontSizeVal.innerText = fontSizeSlider.value + "px";
                              opacityVal.innerText = opacitySlider.value + "%";
                              bindSliders();
                              buildEmptyGrid();
                              startAnimation();
                        }

                        function buildEmptyGrid() {
                              gridContainer.innerHTML = "";
                              cells = [];
                              
                              const viewportWidth = window.innerWidth;
                              const maxGridWidth = Math.min(viewportWidth * 0.8, 900);

                              const idealCellSize = 60;
                              let dynamicCols = Math.floor(maxGridWidth / idealCellSize);
                              dynamicCols = Math.max(15, Math.min(25, dynamicCols));

                              const gridRows = 10;
                              const cellSize = maxGridWidth / dynamicCols;
                              const totalCells = dynamicCols * gridRows;

                              document.documentElement.style.setProperty('--grid-cols', dynamicCols);
                              document.documentElement.style.setProperty('--grid-rows', gridRows);

                              gridContainer.style.gridTemplateColumns = `repeat(${dynamicCols}, ${cellSize}px)`;
                              gridContainer.style.gridTemplateRows = `repeat(${gridRows}, ${cellSize}px)`;
                              gridContainer.style.width = 'fit-content';
                              gridContainer.style.margin = '0 auto';
                              
                              if (characters.length > MAX_CHAR) {
                                    characters = characters.slice(0, MAX_CHAR);
                              }

                              for (let i = 0; i < totalCells; i++) {
                                    const cell = document.createElement("div");
                                    cell.className = "cell";
                                    cell.textContent = "";
                                    cell.style.width = `${cellSize}px`;
                                    cell.style.height = `${cellSize}px`;

                                    const baseFont = parseInt(fontSizeSlider.value, 10);
                                    const jitter = (Math.random() * 0.2 - 0.1) * baseFont;
                                    const finalFont = Math.max(12, Math.floor(baseFont + jitter));
                                    cell.style.fontSize = `${finalFont}px`;

                                    const opacityJitter = opacitySlider.value / 100;
                                    const randOpacity = 1 - (Math.random() * opacityJitter);
                                    cell.style.opacity = randOpacity.toFixed(2);

                                    gridContainer.appendChild(cell);
                                    cells.push(cell);
                              }
                        }

                        function resetGrid() {
                              for (let i = 0; i < cells.length; i++) {
                                    if (cells[i]) {
                                          cells[i].textContent = "";
                                          cells[i].classList.remove("pop");
                                    }
                              }
                              revealedCount = 0;
                              updateProgressText();
                        }

                        function revealCharacterAtIndex(index) {
                              if (index >= characters.length || !cells[index]) return;
                              const cell = cells[index];
                              const char = characters[index];
                              cell.textContent = char;
                              cell.classList.remove("pop");
                              void cell.offsetWidth;
                              cell.classList.add("pop");
                              setTimeout(() => {
                                    cell.classList.remove("pop");
                              }, 350);
                        }

                        // 5 話取得（USE_HARDCODED=true ならローカル配列を使う）
                        async function loadLast5Dreams() {
                              if (USE_HARDCODED) {
                                    last5Dreams = HARDCODED_DREAMS.map(d => normalizeText(d.content));
                                    return true;
                              }
                              try {
                                    const res = await fetch("/api/dream/last5");
                                    if (!res.ok) throw new Error("取得失敗");
                                    const data = await res.json();
                                    last5Dreams = data.map(d => normalizeText(d.content));
                                    return true;
                              } catch (e) {
                                    console.error("loadLast5Dreams error:", e);
                                    return false;
                              }
                        }

                        async function startLast5Playback() {
                              if (last5Dreams.length === 0) {
                                    const ok = await loadLast5Dreams();
                                    if (!ok) {
                                          alert("直近 5 件の取得に失敗しました");
                                          return;
                                    }
                              }
                              if (timer) {
                                    clearInterval(timer);
                                    timer = null;
                              }
                              const wasAutoPlaying = isAutoPlaying;
                              if (wasAutoPlaying) stopAutoPlay();

                              resetGrid();
                              revealedCount = 0;
                              last5Index = 0;
                              isAnimating = true;
                              fullText = last5Dreams[last5Index];
                              characters = fullText.split("");
                              buildEmptyGrid();
                              burstReveal();
                              timer = setInterval(burstReveal, currentSpeed);
                        }

                        function burstReveal() {
                              if (!isAnimating) return;

                              if (revealedCount < characters.length) {
                                    revealCharacterAtIndex(revealedCount);
                                    revealedCount += 1;
                                    updateProgressText();
                                    return;
                              }

                              // 現在の話が完了
                              clearInterval(timer);
                              timer = null;
                              isAnimating = false;

                              // 5 話モード: 次の話へ
                              if (last5Dreams.length > 0 && last5Index < last5Dreams.length - 1) {
                                    last5Index += 1;
                                    fullText = last5Dreams[last5Index];
                                    characters = fullText.split("");
                                    revealedCount = 0;
                                    buildEmptyGrid();
                                    isAnimating = true;
                                    setTimeout(() => {
                                          burstReveal();
                                          timer = setInterval(burstReveal, currentSpeed);
                                    }, 500);
                                    return;
                              }

                              // 通常モード完了 → ハードコード順番再生ならインデックスを進めて次へ
                              if (last5Dreams.length === 0) {
                                    progressStat.textContent = "✨ 筆が止まる — 物語が完成 ✨";

                                    if (isAutoPlaying) {
                                          // 自動再生: 次の夢へ
                                          autoPlayTimer = setTimeout(() => fetchNextDream(), autoPlayDelaySeconds * 1000);
                                    } else if (USE_HARDCODED) {
                                          // 自動再生OFFでもハードコードモードは次へ自動遷移（3秒後）
                                          autoPlayTimer = setTimeout(() => fetchNextDream(), 3000);
                                    }
                                    return;
                              }

                              // 5 話完了
                              progressStat.textContent = "✨ 5 話すべて完了 ✨";
                              if (isAutoPlaying) {
                                    autoPlayTimer = setTimeout(() => fetchNextDream(), autoPlayDelaySeconds * 1000);
                              }
                        }

                        function updateProgressText() {
                              const dreamLabel = USE_HARDCODED
                                    ? `第${(hardcodedIndex % HARDCODED_DREAMS.length) + 1}話`
                                    : "";

                              if (last5Dreams.length > 0) {
                                    const currentStory = last5Index + 1;
                                    const shown = Math.min(revealedCount, characters.length);
                                    progressStat.textContent = `第${currentStory}話 ${shown}/${characters.length}字`;
                                    return;
                              }
                              const shown = Math.min(revealedCount, characters.length);
                              progressStat.textContent = `${dreamLabel} ${shown}/${characters.length}字`;
                        }

                        function startAnimation() {
                              if (timer) {
                                    clearInterval(timer);
                                    timer = null;
                              }
                              last5Dreams = [];
                              last5Index  = 0;
                              resetGrid();
                              revealedCount = 0;
                              isAnimating = true;
                              lastRevealedIndex = 0;
                              burstReveal();
                              timer = setInterval(burstReveal, currentSpeed);
                        }

                        function bindSliders() {
                              speedSlider.addEventListener("input", (e) => {
                                    currentSpeed = parseInt(e.target.value, 10);
                                    speedVal.innerText = currentSpeed + "ms";
                                    if (isAnimating && timer) {
                                          clearInterval(timer);
                                          timer = setInterval(burstReveal, currentSpeed);
                                    }
                              });
                              fontSizeSlider.addEventListener("input", (e) => {
                                    fontSizeVal.innerText = e.target.value + "px";
                                    if (!isAnimating) buildEmptyGrid();
                              });
                              opacitySlider.addEventListener("input", (e) => {
                                    opacityVal.innerText = e.target.value + "%";
                                    if (!isAnimating) buildEmptyGrid();
                              });
                              autoPlayDelay.addEventListener("input", (e) => {
                                    autoPlayDelaySeconds = parseInt(e.target.value, 10);
                                    delayVal.innerText = autoPlayDelaySeconds + "秒";
                              });

                              playLast5Btn.addEventListener("click", async () => {
                                    stopAutoPlay();
                                    last5Dreams = []; // 毎回リセットして最新を取得
                                    await startLast5Playback();
                              });

                              seedInvite.addEventListener("click", () => {
                                    const postTab = document.querySelector('.mode-tab[data-mode="post"]');
                                    if (postTab) postTab.click();
                              });
                        }

                        // モード切り替え
                        modeTabs.forEach((tab) => {
                              tab.addEventListener("click", () => {
                                    modeTabs.forEach((t) => t.classList.remove("active"));
                                    tab.classList.add("active");
                                    const mode = tab.dataset.mode;
                                    readArea.classList.remove("active");
                                    postArea.classList.remove("active");
                                    adjustArea.classList.remove("active");
                                    if (mode === "read") {
                                          readArea.classList.add("active");
                                          if (timer) {
                                                clearInterval(timer);
                                                timer = null;
                                          }
                                          buildEmptyGrid();
                                          startAnimation();
                                    } else if (mode === "post") {
                                          postArea.classList.add("active");
                                          stopAutoPlay();
                                    } else if (mode === "adjust") {
                                          adjustArea.classList.add("active");
                                          stopAutoPlay();
                                    }
                              });
                        });

                        // 投稿タブ切り替え
                        const postTabs   = document.querySelectorAll(".post-tab");
                        const submitTab  = document.getElementById("submitTab");
                        const seedsTab   = document.getElementById("seedsTab");
                        const dreamsTab  = document.getElementById("dreamsTab");
                        
                        postTabs.forEach((tab) => {
                              tab.addEventListener("click", () => {
                                    postTabs.forEach((t) => t.classList.remove("active"));
                                    tab.classList.add("active");
                                    const tabName = tab.dataset.tab;
                                    submitTab.classList.remove("active");
                                    seedsTab.classList.remove("active");
                                    dreamsTab.classList.remove("active");
                                    if (tabName === "submit") {
                                          submitTab.classList.add("active");
                                    } else if (tabName === "seeds") {
                                          seedsTab.classList.add("active");
                                          loadSeeds();
                                    } else if (tabName === "dreams") {
                                          dreamsTab.classList.add("active");
                                          loadDreams();
                                    }
                              });
                        });
                        
                        // リスト読み込み（USE_HARDCODED 時はローカルデータで表示）
                        async function loadSeeds() {
                              const seedsList = document.getElementById("seedsList");
                              if (USE_HARDCODED) {
                                    seedsList.innerHTML = '<div class="loading">（ハードコードモード：種データは準備中）</div>';
                                    return;
                              }
                              seedsList.innerHTML = '<div class="loading">読み込み中...</div>';
                              try {
                                    const res = await fetch("/api/seeds");
                                    const data = await res.json();
                                    if (data.length === 0) {
                                          seedsList.innerHTML = '<div class="loading">種がありません</div>';
                                          return;
                                    }
                                    let html = '';
                                    data.forEach(seed => {
                                          html += '<div class="list-item" onclick="useSeed(' + seed.id + ')"><div>種 #' + seed.id + ': ' + seed.content.substring(0, 30) + (seed.content.length > 30 ? '...' : '') + '</div></div>';
                                    });
                                    seedsList.innerHTML = html;
                              } catch (err) {
                                    seedsList.innerHTML = '<div class="loading">読み込みエラー</div>';
                              }
                        }
                        
                        async function loadDreams() {
                              const dreamsList = document.getElementById("dreamsList");
                              if (USE_HARDCODED) {
                                    let html = '';
                                    HARDCODED_DREAMS.forEach(dream => {
                                          const preview = dream.content.substring(0, 30) + (dream.content.length > 30 ? '...' : '');
                                          html += `<div class="list-item" onclick="viewDream(${dream.id})"><div>夢 #${dream.id}: ${preview}</div><div style="font-size:0.8rem;color:#a89470;">${dream.date}</div></div>`;
                                    });
                                    dreamsList.innerHTML = html;
                                    return;
                              }
                              dreamsList.innerHTML = '<div class="loading">読み込み中...</div>';
                              try {
                                    const res = await fetch("/api/dreams?limit=20");
                                    const data = await res.json();
                                    if (data.length === 0) {
                                          dreamsList.innerHTML = '<div class="loading">夢がありません</div>';
                                          return;
                                    }
                                    let html = '';
                                    data.forEach(dream => {
                                          html += '<div class="list-item" onclick="viewDream(' + dream.id + ')"><div>夢 #' + dream.id + ': ' + dream.content.substring(0, 30) + (dream.content.length > 30 ? '...' : '') + '</div><div style="font-size: 0.8rem; color: #a89470;">' + dream.created_at + '</div></div>';
                                    });
                                    dreamsList.innerHTML = html;
                              } catch (err) {
                                    dreamsList.innerHTML = '<div class="loading">読み込みエラー</div>';
                              }
                        }
                        
                        async function useSeed(seedId) {
                              if (USE_HARDCODED) return; // ハードコードモード時はスキップ
                              try {
                                    const res = await fetch(`/api/dream/random?seed_id=${seedId}`);
                                    if (!res.ok) throw new Error("夢の取得に失敗しました");
                                    const dream = await res.json();
                                    viewDream(dream.id);
                              } catch (err) {
                                    alert("エラー: " + err.message);
                              }
                        }
                        
                        function viewDream(dreamId) {
                              modeTabs.forEach(tab => tab.classList.remove("active"));
                              document.querySelector('[data-mode="read"]').classList.add("active");
                              readArea.classList.add("active");
                              postArea.classList.remove("active");
                              adjustArea.classList.remove("active");
                              fetchDream(dreamId);
                        }

                        replayBtn.addEventListener("click", () => {
                              if (timer) {
                                    clearInterval(timer);
                                    timer = null;
                              }
                              startAnimation();
                        });

                        newDreamBtn.addEventListener("click", () => {
                              stopAutoPlay();
                              if (autoPlayTimer) clearTimeout(autoPlayTimer);
                              fetchNextDream();
                        });
                        
                        function toggleAutoPlay() {
                              if (isAutoPlaying) stopAutoPlay();
                              else startAutoPlay();
                        }
                        
                        function startAutoPlay() {
                              isAutoPlaying = true;
                              autoPlayBtn.textContent = "⏸️ 停止";
                              autoPlayStatus.textContent = "自動再生: ON";
                              autoPlayStatus.style.background = "#8f6a48";
                              autoPlayStatus.style.color = "#fef0df";
                              if (!isAnimating) fetchNextDream();
                        }
                        
                        function stopAutoPlay() {
                              isAutoPlaying = false;
                              autoPlayBtn.textContent = "▶️ 自動再生";
                              autoPlayStatus.textContent = "自動再生: OFF";
                              autoPlayStatus.style.background = "#cebb97";
                              autoPlayStatus.style.color = "#2a211a";
                              if (autoPlayTimer) {
                                    clearTimeout(autoPlayTimer);
                                    autoPlayTimer = null;
                              }
                        }
                        
                        autoPlayBtn.addEventListener("click", toggleAutoPlay);

                        // 種投稿フォーム
                        const seedForm = document.getElementById("seedForm");
                        seedForm.addEventListener("submit", async (e) => {
                              e.preventDefault();
                              if (USE_HARDCODED) {
                                    alert("ハードコードモード中は投稿できません。DB 接続後に有効になります。");
                                    return;
                              }
                              const textarea = seedForm.querySelector("textarea");
                              const content = textarea.value.trim();
                              if (!content) return;

                              try {
                                    const seedRes = await fetch("/api/seed/submit", {
                                          method: "POST",
                                          headers: { "Content-Type": "application/json" },
                                          body: JSON.stringify({ content }),
                                    });
                                    const seedData = await seedRes.json();
                                    if (!seedRes.ok)
                                          throw new Error(seedData.error || "投稿失敗");

                                    alert(`種を投稿しました！（ID: ${seedData.id}）\n夢を生成中...`);
                                    textarea.value = "";

                                    const dreamRes = await fetch(`/api/dream/random?seed_id=${seedData.id}`);
                                    const dreamData = await dreamRes.json();
                                    if (!dreamRes.ok)
                                          throw new Error(dreamData.error || "生成失敗");

                                    characters = dreamData.content.split("");
                                    revealedCount = 0;
                                    resetGrid();
                                    startAnimation();

                                    modeTabs.forEach((t) => t.classList.remove("active"));
                                    document.querySelector('[data-mode="read"]').classList.add("active");
                                    readArea.classList.add("active");
                                    postArea.classList.remove("active");
                                    adjustArea.classList.remove("active");

                                    alert("新しい夢が生成されました！");
                              } catch (err) {
                                    alert("エラー: " + err.message);
                              }
                        });

                        // 初期化（第1話から開始）
                        fetchDream();
                  })();
            </script>
      </body>
</html>
